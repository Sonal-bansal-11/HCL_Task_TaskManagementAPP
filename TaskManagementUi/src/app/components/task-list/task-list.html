<div class="d-flex justify-content-between align-items-center mb-4 mt-4">
  <h2>My Tasks</h2>
  <a routerLink="/add-task" class="btn btn-primary">+ Add New Task</a>
</div>

<div class="table-responsive shadow-sm rounded">
  <table class="table table-bordered table-hover mb-0">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (task of tasks; track task.id) {
        <tr>
          <td>{{ task.id }}</td>
          <td><strong>{{ task.title }}</strong></td>
          <td>{{ task.description }}</td>
          <td>
            <span class="badge" [ngClass]="task.isCompleted ? 'bg-success' : 'bg-warning text-dark'">
              {{ task.isCompleted ? 'Completed' : 'Pending' }}
            </span>
          </td>
          <td>
            <a [routerLink]="['/edit-task', task.id]" class="btn btn-sm btn-info me-2 text-white">Edit</a>
            <button (click)="deleteTask(task.id)" class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="text-center p-4 text-muted">
            No tasks found. Click "Add New Task" to create your first task!
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
